name: Deploy Production to Cloud Run
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run code checks
        run: npm run check

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/315620914732/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-action-965078087@rowan-fyi.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and Push Container Image
        run: |
          IMAGE_URI="europe-west1-docker.pkg.dev/rowan-fyi/rowan-fyi-repo/rowan-fyi:latest"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: "rowan-fyi"
          region: "europe-west1"
          image: "europe-west1-docker.pkg.dev/rowan-fyi/rowan-fyi-repo/rowan-fyi:latest"
